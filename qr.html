<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te Whare Mā - QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: #f5f1e8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 3px solid #1a3a3a;
        }
        h1 {
            color: #1a3a3a;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .subtitle {
            color: #2d5a5a;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }
        #qrcode {
            margin: 2rem auto;
            padding: 1.5rem;
            background: white;
            display: inline-block;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
        .scan-text {
            color: #1a3a3a;
            font-size: 1.1rem;
            margin: 1.5rem 0 0.5rem 0;
            font-weight: 600;
        }
        .url {
            color: #2d5a5a;
            font-size: 0.85rem;
            word-break: break-all;
            margin-top: 0.5rem;
            font-family: monospace;
        }
        .footer {
            margin-top: 2rem;
            color: #c9a66b;
            font-style: italic;
            font-size: 1.1rem;
        }
        .location {
            color: #666;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            letter-spacing: 0.1em;
        }
        .print-button {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1a3a3a;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        @media print {
            body { background: white; }
            .card { box-shadow: none; border: 2px solid #1a3a3a; }
            .print-button { display: none; }
            #qrcode { border: 1px solid #ddd; }
        }
        @media (max-width: 480px) {
            .card { padding: 2rem; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Te Whare Mā</h1>
        <div class="subtitle">Guest Guide</div>
        <div id="qrcode"></div>
        <div class="scan-text">Scan for digital guide</div>
        <div class="location">Whangaroa Harbour, New Zealand</div>
        <div class="url">AllinOneNZ.github.io/tewharema-guest-guide</div>
        <div class="footer">Ngā mihi nui</div>
    </div>
    <button class="print-button" onclick="window.print()">🖨️ Print QR Code</button>
    <script>
        window.onload = function() {
            new QRCode(document.getElementById("qrcode"), {
                text: "https://AllinOneNZ.github.io/tewharema-guest-guide/",
                width: 220,
                height: 220,
                colorDark: "#1a3a3a",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        };
    </script>
</body>
</html>
